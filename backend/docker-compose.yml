version: '3.8'

services:
  opencv-service:
    build:
      context: ./opencv-service
      dockerfile: Dockerfile
    container_name: opencv-document-processor
    ports:
      - "5000:5000"
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./opencv-service:/app
    networks:
      - gestor-network

networks:
  gestor-network:
    driver: bridge
